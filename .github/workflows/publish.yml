name: Publish Temperature Data

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours — adjust as needed
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Publish temperature entry
        run: python publish_temperature.py

      - name: Commit updated state.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: advance rotation index [skip ci]"
          git push
